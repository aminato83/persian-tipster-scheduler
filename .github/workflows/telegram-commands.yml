name: Telegram Commands Listener

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  telegram_commands:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pillow -q
      - run: python scripts/telegram_commands.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Save offset
        run: |
          git config user.email "bot@persiantipster.com"
          git config user.name "PersianTipster Bot"
          git add telegram_offset.json || true
          git diff --staged --quiet || git commit -m "Update telegram offset [skip ci]"
          git pull --rebase || true
          git push || true
