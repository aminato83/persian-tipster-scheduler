name: Persian Tipster — Full Automation

on:
  schedule:
    - cron: '*/15 * * * *'
    - cron: '0 * * * *'
    - cron: '30 6 * * *'
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task'
        required: false
        default: 'publish'
        type: choice
        options: [publish, telegram, weekly, story_morning, story_matchday, story_win]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  publish:
    if: github.event.schedule == '*/15 * * * *' || github.event.inputs.task == 'publish' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - run: python scripts/scheduler.py
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}

  telegram:
    if: github.event.schedule == '0 * * * *' || github.event.inputs.task == 'telegram'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg --fix-missing -q
      - run: python scripts/telegram_scanner.py
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Save scan state
        run: |
          git config user.email "bot@persiantipster.com"
          git config user.name "PersianTipster Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Update scan state [skip ci]"
          git push || true

  story_morning:
    if: github.event.schedule == '30 6 * * *' || github.event.inputs.task == 'story_morning'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - run: python scripts/stories.py
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          STORY_TYPE: morning
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: "36000867572895127"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  story_matchday:
    if: github.event.inputs.task == 'story_matchday'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - run: python scripts/stories.py
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          STORY_TYPE: matchday
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: "36000867572895127"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  story_win:
    if: github.event.inputs.task == 'story_win'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - run: python scripts/stories.py
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          STORY_TYPE: win
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: "36000867572895127"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  weekly:
    if: github.event.schedule == '0 6 * * 1' || github.event.inputs.task == 'weekly'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - run: python scripts/weekly_generator.py
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      - name: Save new schedule
        run: |
          git config user.email "bot@persiantipster.com"
          git config user.name "PersianTipster Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Weekly schedule update [skip ci]"
          git push || true
# NOTE: Add these 2 env vars to story jobs
# IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
# IG_USER_ID: "36000867572895127"
