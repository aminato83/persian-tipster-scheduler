name: Daily Trends

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  daily_trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests playwright -q
      - run: playwright install --with-deps chromium
      - run: python scripts/daily_trends.py
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Save published state
        run: |
          git config user.email "bot@persiantipster.com"
          git config user.name "PersianTipster Bot"
          git add published.json
          git diff --staged --quiet || git commit -m "Daily trends published [skip ci]"
          git pull --rebase || true
          git push || true
