name: Weekly Generator

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - run: python scripts/weekly_generator.py
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      - name: Save new schedule
        run: |
          git config user.email "bot@persiantipster.com"
          git config user.name "PersianTipster Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Weekly schedule update [skip ci]"
          git pull --rebase || true
          git push || true
